<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Architecture technique du démonstrateur CIDO</title>
  <desc id="description">Schéma des relations entre l’utilisateur, React, NestJS, Prisma, PostgreSQL sur Supabase, Docker et Koyeb.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf9fd"/>
      <stop offset="1" stop-color="#eee7f5"/>
    </linearGradient>
    <linearGradient id="koyebBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1eafa"/>
      <stop offset="1" stop-color="#e8dcf5"/>
    </linearGradient>
    <linearGradient id="dockerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#e7f2fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#32185b" flood-opacity=".13"/>
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#67409a"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#397d68"/>
    </marker>
    <style>
      .title { font: 700 42px Arial, sans-serif; fill: #2b183f; }
      .subtitle { font: 400 20px Arial, sans-serif; fill: #655a70; }
      .platform { font: 700 24px Arial, sans-serif; fill: #4e2a84; }
      .platform-note { font: 400 16px Arial, sans-serif; fill: #655a70; }
      .box-title { font: 700 25px Arial, sans-serif; fill: #2b183f; }
      .box-text { font: 400 17px Arial, sans-serif; fill: #51475a; }
      .small-title { font: 700 19px Arial, sans-serif; fill: #2b183f; }
      .small-text { font: 400 15px Arial, sans-serif; fill: #5f5568; }
      .arrow-label { font: 700 15px Arial, sans-serif; fill: #67409a; }
      .legend { font: 400 15px Arial, sans-serif; fill: #5f5568; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#background)"/>

  <text x="800" y="68" text-anchor="middle" class="title">Architecture technique du démonstrateur CIDO</text>
  <text x="800" y="103" text-anchor="middle" class="subtitle">Du navigateur de l’utilisateur jusqu’au stockage des données</text>

  <!-- Utilisateur -->
  <g filter="url(#shadow)">
    <rect x="55" y="330" width="210" height="190" rx="28" fill="#ffffff" stroke="#d8cce3" stroke-width="2"/>
  </g>
  <circle cx="160" cy="382" r="27" fill="#e9def3" stroke="#67409a" stroke-width="3"/>
  <path d="M107 466c7-39 29-59 53-59s46 20 53 59" fill="#e9def3" stroke="#67409a" stroke-width="3" stroke-linecap="round"/>
  <text x="160" y="495" text-anchor="middle" class="box-title">Utilisateur</text>
  <text x="160" y="524" text-anchor="middle" class="small-text">Étudiant · Conseiller</text>
  <text x="160" y="546" text-anchor="middle" class="small-text">Administrateur</text>

  <!-- Koyeb -->
  <g filter="url(#shadow)">
    <rect x="345" y="150" width="875" height="615" rx="34" fill="url(#koyebBg)" stroke="#9b83bd" stroke-width="3"/>
  </g>
  <text x="385" y="198" class="platform">KOYEB</text>
  <text x="385" y="225" class="platform-note">Héberge l’application, expose son adresse web et maintient le service en fonctionnement</text>

  <!-- Docker -->
  <rect x="390" y="250" width="785" height="455" rx="28" fill="url(#dockerBg)" stroke="#4b91c4" stroke-width="3" stroke-dasharray="10 7"/>
  <text x="425" y="295" class="platform" fill="#246b9d">DOCKER</text>
  <text x="425" y="321" class="platform-note">Conteneur standardisé : Node.js, application compilée, dépendances et Prisma</text>

  <!-- React -->
  <g filter="url(#shadow)">
    <rect x="435" y="360" width="215" height="225" rx="24" fill="#ffffff" stroke="#65b6cc" stroke-width="3"/>
  </g>
  <circle cx="542" cy="405" r="10" fill="#55b8d3"/>
  <ellipse cx="542" cy="405" rx="39" ry="15" fill="none" stroke="#55b8d3" stroke-width="3"/>
  <ellipse cx="542" cy="405" rx="39" ry="15" fill="none" stroke="#55b8d3" stroke-width="3" transform="rotate(60 542 405)"/>
  <ellipse cx="542" cy="405" rx="39" ry="15" fill="none" stroke="#55b8d3" stroke-width="3" transform="rotate(120 542 405)"/>
  <text x="542" y="478" text-anchor="middle" class="box-title">React</text>
  <text x="542" y="510" text-anchor="middle" class="box-text">Interface web</text>
  <text x="542" y="536" text-anchor="middle" class="small-text">Affichage, formulaires</text>
  <text x="542" y="558" text-anchor="middle" class="small-text">et interactions</text>

  <!-- NestJS -->
  <g filter="url(#shadow)">
    <rect x="685" y="360" width="215" height="225" rx="24" fill="#ffffff" stroke="#d65c72" stroke-width="3"/>
  </g>
  <path d="M792 383l32 19-5 40-27 19-27-19-5-40z" fill="#f7e3e7" stroke="#c84461" stroke-width="3"/>
  <path d="M777 415l15-11 15 11-15 15z" fill="#c84461"/>
  <text x="792" y="478" text-anchor="middle" class="box-title">API NestJS</text>
  <text x="792" y="510" text-anchor="middle" class="box-text">Moteur métier</text>
  <text x="792" y="536" text-anchor="middle" class="small-text">Droits, contrôles, règles</text>
  <text x="792" y="558" text-anchor="middle" class="small-text">et traitements</text>

  <!-- Prisma -->
  <g filter="url(#shadow)">
    <rect x="935" y="360" width="195" height="225" rx="24" fill="#ffffff" stroke="#596778" stroke-width="3"/>
  </g>
  <path d="M1032 378l35 64-57 16z" fill="#e4e9ee" stroke="#384554" stroke-width="3" stroke-linejoin="round"/>
  <path d="M1032 378l-22 80 42-18z" fill="#ffffff" stroke="#384554" stroke-width="3" stroke-linejoin="round"/>
  <text x="1032" y="478" text-anchor="middle" class="box-title">Prisma</text>
  <text x="1032" y="510" text-anchor="middle" class="box-text">Accès aux données</text>
  <text x="1032" y="536" text-anchor="middle" class="small-text">Traduit les actions</text>
  <text x="1032" y="558" text-anchor="middle" class="small-text">en requêtes SQL</text>

  <!-- Supabase -->
  <g filter="url(#shadow)">
    <rect x="1300" y="275" width="245" height="375" rx="28" fill="#ffffff" stroke="#4cae88" stroke-width="3"/>
  </g>
  <path d="M1404 338h54l-38 65h-55z" fill="#dff4eb" stroke="#3b9d77" stroke-width="3" stroke-linejoin="round"/>
  <path d="M1425 366h53l-72 93 17-56z" fill="#5bc39a" stroke="#3b9d77" stroke-width="3" stroke-linejoin="round"/>
  <text x="1422" y="497" text-anchor="middle" class="box-title">Supabase</text>
  <text x="1422" y="528" text-anchor="middle" class="box-text">Hébergement de la base</text>
  <text x="1422" y="557" text-anchor="middle" class="small-title">PostgreSQL</text>
  <text x="1422" y="581" text-anchor="middle" class="small-text">Stockage durable :</text>
  <text x="1422" y="603" text-anchor="middle" class="small-text">comptes, créneaux, RDV,</text>
  <text x="1422" y="625" text-anchor="middle" class="small-text">messages et documents</text>

  <!-- Arrows -->
  <path d="M265 425 C300 425 315 425 345 425" fill="none" stroke="#67409a" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <path d="M345 475 C315 475 300 475 265 475" fill="none" stroke="#67409a" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <text x="305" y="405" text-anchor="middle" class="arrow-label">HTTPS</text>
  <text x="305" y="505" text-anchor="middle" class="small-text">pages et réponses</text>

  <path d="M650 438 H685" fill="none" stroke="#67409a" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <path d="M685 505 H650" fill="none" stroke="#67409a" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <text x="667" y="419" text-anchor="middle" class="arrow-label">API</text>
  <text x="667" y="535" text-anchor="middle" class="small-text">JSON</text>

  <path d="M900 470 H935" fill="none" stroke="#67409a" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <path d="M935 520 H900" fill="none" stroke="#67409a" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <text x="918" y="450" text-anchor="middle" class="arrow-label">Appels</text>
  <text x="918" y="550" text-anchor="middle" class="small-text">résultats</text>

  <path d="M1130 440 C1210 440 1230 410 1300 410" fill="none" stroke="#397d68" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M1300 515 C1230 515 1210 545 1130 545" fill="none" stroke="#397d68" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="1212" y="392" text-anchor="middle" class="arrow-label" fill="#397d68">Connexion sécurisée</text>
  <text x="1212" y="575" text-anchor="middle" class="small-text">données retournées</text>

  <!-- Deployment flow -->
  <rect x="390" y="790" width="815" height="72" rx="20" fill="#ffffff" stroke="#d8cce3" stroke-width="2"/>
  <text x="430" y="821" class="small-title">Déploiement</text>
  <text x="430" y="847" class="small-text">Le code est construit en image Docker, puis cette image est lancée et supervisée par Koyeb.</text>
  <path d="M1225 826 H1295" fill="none" stroke="#67409a" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <text x="1385" y="821" text-anchor="middle" class="small-title">Base séparée</text>
  <text x="1385" y="847" text-anchor="middle" class="small-text">Supabase reste externe à Docker</text>
</svg>
